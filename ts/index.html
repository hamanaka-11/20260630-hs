<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テキストの影 text-shadow</title>
    <link rel="stylesheet" href="ts/style.css">
</head>
<body>
    <h1>
        テキストの影 text-shadow
    </h1>
    <h1 class="shadow-strong">Text Shadow - 強い影</h1>
    <h2 class="shadow-soft">Text Shadow - 柔らかい影</h2>

</body>
</html>
